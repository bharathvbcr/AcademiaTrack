<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://aistudiocdn.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:3000 https://*.googleapis.com https://nominatim.openstreetmap.org https://timeapi.io; img-src 'self' data:; object-src 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcademiaTrack</title>
  <link rel="icon" href="AcademiaTrack.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    :root {
      /* Minimal Dark Palette */
      --bg-base: #09090b;
      /* Zinc 950 */
      --bg-card: #18181b;
      /* Zinc 900 */
      --bg-card-hover: #27272a;
      /* Zinc 800 */
      --border-color: #27272a;
      /* Zinc 800 */

      --text-primary: #f4f4f5;
      /* Zinc 100 */
      --text-secondary: #a1a1aa;
      /* Zinc 400 */
      --text-muted: #71717a;
      /* Zinc 500 */

      --accent-primary: #dc2626;
      /* Red 600 */
      --accent-hover: #b91c1c;
      /* Red 700 */
      --accent-subtle: rgba(220, 38, 38, 0.1);

      /* Re-mapping old variables to new palette for compatibility */
      --crimson-diffused: var(--accent-primary);
      --crimson-diffused-40: var(--accent-subtle);
      --crimson-diffused-50: var(--accent-subtle);
      --crimson-diffused-60: var(--accent-subtle);
      --scarlet-red: var(--accent-primary);
      --scarlet-red-30: var(--accent-subtle);
      --scarlet-red-50: var(--accent-subtle);
      --rose-gold: var(--text-secondary);
      --rose-gold-dark: var(--text-muted);
      --rose-gold-30: rgba(161, 161, 170, 0.3);
      --rose-gold-50: rgba(161, 161, 170, 0.5);
      --pale-pink: var(--text-primary);
      --pale-pink-dark: var(--text-secondary);
      --pale-pink-20: rgba(244, 244, 245, 0.2);
      --pale-pink-30: rgba(244, 244, 245, 0.3);

      --bg-base-light: var(--bg-card);
      --bg-surface-glass: var(--bg-card);
      --glass-border: var(--border-color);

      /* Dark Red Background Variables - Muted to dark */
      --dark-red: #18181b;
      --dark-red-15: rgba(24, 24, 27, 0.5);
      --dark-red-12: rgba(24, 24, 27, 0.5);
      --darker-red: #09090b;
      --darker-red-12: rgba(9, 9, 11, 0.5);
      --darker-red-10: rgba(9, 9, 11, 0.5);
      --very-dark-red-5: rgba(9, 9, 11, 0.5);

      /* Glass Effect Variables - Removed glass, now solid */
      --glass-blur: none;
      --glass-shadow: none;
      --glass-shadow-hover: none;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-primary);
    }

    /* Remove the pseudo-element gradients */
    body::before {
      display: none;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: bottom;
    }

    /* Custom focus ring */
    *:focus-visible {
      outline: 2px solid var(--accent-primary) !important;
      outline-offset: 2px !important;
      box-shadow: none !important;
    }

    /* Minimal Dropdown */
    .liquid-glass-dropdown {
      position: relative;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .liquid-glass-dropdown::before {
      display: none;
    }

    .liquid-glass-dropdown:hover {
      background: var(--bg-card-hover);
      transform: none;
      box-shadow: none;
    }

    /* Replaced Liquid Glass Utilities with Minimal equivalents */
    .liquid-glass {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      transition: all 0.2s ease;
    }

    .liquid-glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border-radius: 12px;
      /* Consistent corner radius */
      transition: all 0.2s ease;
    }

    .liquid-glass-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-color);
      transform: none;
      box-shadow: none;
    }

    .liquid-glass-nav {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .liquid-glass-modal {
      background: rgba(9, 9, 11, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .liquid-glass-modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    /* Restored Liquid Glass for specific depth elements */
    .liquid-glass-depth {
      background: rgba(24, 24, 27, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .glass-depth-1,
    .glass-depth-2,
    .glass-depth-3,
    .glass-refraction::before {
      box-shadow: none;
      background: none;
      display: none;
    }

    /* Custom Scrollbar - Minimal */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: var(--border-color);
      border-radius: 20px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: var(--text-secondary);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.3.0"
  }
}
</script>

</head>

<body class="transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
