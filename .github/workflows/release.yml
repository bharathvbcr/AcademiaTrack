name: Release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  resolve:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
      release_name: ${{ steps.release_meta.outputs.release_name }}
      should_release: ${{ steps.release_meta.outputs.should_release }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag and derive release metadata
        id: release_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            if [[ -z "$TAG" || ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "::error::Release tag must be strict semver: vMAJOR.MINOR.PATCH (e.g., v1.2.3)."
              exit 1
            fi
            VERSION="${TAG#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
            if [[ -z "$VERSION" || ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "::error::package.json version must be strict semver before auto release."
              exit 1
            fi
          fi

          export VERSION
          RELEASE_NAME="AcademiaTrack v${VERSION}"

          if [ ! -f "package.json" ]; then
            echo "::error::package.json is required for release validation."
            exit 1
          fi

          if [ ! -f "CHANGELOG.md" ]; then
            echo "::error::CHANGELOG.md is required for release validation."
            exit 1
          fi
          if [ ! -f "package-lock.json" ]; then
            echo "::warning::package-lock.json is missing; skipping lockfile version validation."
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag version ${VERSION} must match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

          if [ -f "package-lock.json" ]; then
            LOCK_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package-lock.json','utf8')).version || ''")"
            if [[ -n "${LOCK_VERSION}" && "${VERSION}" != "${LOCK_VERSION}" ]]; then
              echo "::error::Tag version ${VERSION} must match package-lock.json version ${LOCK_VERSION}."
              exit 1
            fi
          fi

          if ! grep -Fq "## [${VERSION}]" CHANGELOG.md
          then
            echo "::error::Release notes section for ${VERSION} is missing from CHANGELOG.md."
            exit 1
          fi

          if [ -n "${GITHUB_API_URL}" ] && [ -n "${GITHUB_REPOSITORY}" ] && [ -n "${GH_TOKEN}" ]; then
            STATUS_CODE="$(curl -sS -o /tmp/release_lookup.json -w "%{http_code}" -H "Authorization: Bearer ${GH_TOKEN}" "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")"
            if [[ "${STATUS_CODE}" == "200" ]]; then
              echo "Release ${TAG} already exists in GitHub Releases; skipping release build."
              echo "tag=$TAG" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            elif [[ "${STATUS_CODE}" != "404" ]]; then
              echo "::warning::Could not confirm release uniqueness for ${TAG} (HTTP ${STATUS_CODE}). Continuing."
            fi
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "::error::Tag ${TAG} is not a valid git tag reference."
              exit 1
            fi

            TAG_COMMIT="$(git rev-list -n 1 "refs/tags/${TAG}")"
            if [ "${GITHUB_SHA}" != "${TAG_COMMIT}" ]; then
              echo "::warning::Tag ${TAG} resolves to ${TAG_COMMIT}, workflow event SHA is ${GITHUB_SHA}."
            fi
          else
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "::error::Tag ${TAG} already exists. Bump package.json before merging to main."
              exit 1
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${TAG}"
            echo "Created release tag ${TAG} at ${GITHUB_SHA}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Release metadata resolved for $TAG"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Verify Node Version
        shell: bash
        run: |
          node --version
          case "$(node --version)" in
            v"$(tr -d '\r\n' < .nvmrc)".*) ;;
            *)
              echo "::error::Node version does not match .nvmrc"
              exit 1
              ;;
          esac

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npm run test:run

  build:
    name: Build Desktop App
    permissions:
      contents: write
    needs: [test, resolve]
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Verify Node Version
        shell: bash
        run: |
          node --version
          case "$(node --version)" in
            v"$(tr -d '\r\n' < .nvmrc)".*) ;;
            *)
              echo "::error::Node version does not match .nvmrc"
              exit 1
              ;;
          esac

      - name: Install Dependencies
        run: npm ci

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build Desktop App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:electron

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.resolve.outputs.tag }}-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 7

  collect:
    name: Collect Release Artifacts
    needs: [build, resolve]
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false
    permissions:
      contents: read
    steps:
      - name: Download platform artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.resolve.outputs.tag }}-${{ matrix.os }}
          path: release-${{ matrix.os }}

      - name: Verify platform artifact download
        shell: bash
        run: |
          if [ -z "$(find "release-${{ matrix.os }}" -type f | head -n 1)" ]; then
            echo "::error::Missing artifacts for ${{ matrix.os }}."
            exit 1
          fi

      - name: Upload collected artifact shard
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ needs.resolve.outputs.tag }}-${{ matrix.os }}
          path: release-${{ matrix.os }}
          retention-days: 7

  release:
    name: Create Release
    needs: [collect, resolve]
    if: needs.resolve.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-${{ needs.resolve.outputs.tag }}-*
          path: release
          merge-multiple: true

      - name: Verify merged artifacts
        shell: bash
        run: |
          if [ -z "$(find release -type f | head -n 1)" ]; then
            echo "::error::Merged release artifacts are missing."
            exit 1
          fi

      - name: Generate Release Notes
        env:
          GITHUB_REF_NAME: ${{ needs.resolve.outputs.tag }}
        run: node scripts/generate-release-notes.cjs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.release_name }}
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.zip
            release/*.blockmap
            release/latest*.yml
          body_path: .github/release-notes.md
          generate_release_notes: true
          append_body: true
          draft: false
          prerelease: false
