name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  resolve:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
      release_name: ${{ steps.release_meta.outputs.release_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate tag and derive release metadata
        id: release_meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ -z "$TAG" || ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must be semver-like, e.g. v1.2.3"
            exit 1
          fi

          VERSION="${TAG#v}"

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "::error::Tag version $VERSION must match package.json version $PACKAGE_VERSION"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=AcademiaTrack v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release metadata resolved for $TAG"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm run test:run

  build:
    name: Build Electrobun App
    permissions:
      contents: read
    needs: [test, resolve]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: npm ci

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Build Electrobun App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:desktop

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.resolve.outputs.tag }}-${{ matrix.os }}
          path: |
            release/**
          if-no-files-found: error
          retention-days: 7

  collect:
    name: Collect Release Artifacts
    needs: [build, resolve]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
      fail-fast: false
    permissions:
      contents: read
    steps:
      - name: Download platform artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.resolve.outputs.tag }}-${{ matrix.os }}
          path: release-${{ matrix.os }}
          if-no-files-found: error

      - name: Upload collected artifact shard
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ needs.resolve.outputs.tag }}-${{ matrix.os }}
          path: release-${{ matrix.os }}
          retention-days: 7

  release:
    name: Create Release
    needs: [collect, resolve]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-${{ needs.resolve.outputs.tag }}-*
          path: release
          merge-multiple: true
          if-no-files-found: error

      - name: Generate Release Notes
        env:
          GITHUB_REF_NAME: ${{ needs.resolve.outputs.tag }}
        run: node scripts/generate-release-notes.cjs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.release_name }}
          files: |
            release/**
          body_path: .github/release-notes.md
          generate_release_notes: true
          append_body: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
