name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Verify Node Version
        shell: bash
        run: |
          node --version
          case "$(node --version)" in
            v"$(tr -d '\r\n' < .nvmrc)".*) ;;
            *)
              echo "::error::Node version does not match .nvmrc"
              exit 1
              ;;
          esac

      - name: Check Version Consistency
        shell: bash
        run: node scripts/check-version-consistency.cjs

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Typecheck
        run: npm run typecheck

      - name: Run Test Suite
        run: npm run test:run

      - name: Build Desktop App
        run: npm run build:tauri
