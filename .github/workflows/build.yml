name: Build/Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Verify And Package
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 xvfb

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run Test Suite
        run: npm run test:run

      - name: Build Profiler (Start)
        shell: bash
        run: |
          # Start profiler in background or just run a sample check
          # For this integration, we wrap the build command
          echo "Profiler ready."

      - name: Build Electrobun App (Measured)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/measure-build.cjs "Electrobun Build" npm run build:desktop > build.log 2>&1
          cat build.log

      - name: Analyze Build Logs
        if: always()
        run: node scripts/log-analyzer.cjs build.log

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/
            build/
            build-timings.json
            log-analysis-report.md
            test-results/
          retention-days: 5
