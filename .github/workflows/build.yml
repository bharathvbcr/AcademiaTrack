name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 xvfb

      - name: Install Dependencies
        run: npm ci

      - name: Verify Electrobun Patch Applied
        shell: bash
        run: |
          grep -Fq "setupWindowsRceditShim" node_modules/electrobun/bin/electrobun.cjs
          grep -Fq "NoProfile -NonInteractive -ExecutionPolicy Bypass" node_modules/electrobun/src/cli/index.ts

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run Test Suite
        run: npm run test:run

      - name: Build Desktop App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:desktop

  windows-package-smoke:
    name: Windows Bun Package Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Verify Electrobun Patch Applied
        shell: bash
        run: |
          grep -Fq "setupWindowsRceditShim" node_modules/electrobun/bin/electrobun.cjs
          grep -Fq "NoProfile -NonInteractive -ExecutionPolicy Bypass" node_modules/electrobun/src/cli/index.ts

      - name: Bun Package Smoke Test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run package
