name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Bun (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://bun.com/install | bash -s "bun-v${BUN_VERSION}"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install Bun (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          iex "& {$(irm https://bun.com/install.ps1)} -Version ${env:BUN_VERSION}"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.bun\bin"

      - name: Verify Bun Version
        shell: bash
        run: |
          bun --version
          test "$(bun --version)" = "${BUN_VERSION}"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 xvfb

      - name: Install Dependencies
        run: npm ci

      - name: Verify Electrobun Patch Applied
        shell: bash
        run: |
          grep -Fq "setupWindowsRceditShim" node_modules/electrobun/bin/electrobun.cjs
          grep -Fq "NoProfile -NonInteractive -ExecutionPolicy Bypass" node_modules/electrobun/src/cli/index.ts

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run Test Suite
        run: npm run test:run

      - name: Build Desktop App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:desktop

  windows-package-smoke:
    name: Windows Bun Package Smoke
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Bun (Windows)
        shell: pwsh
        run: |
          iex "& {$(irm https://bun.com/install.ps1)} -Version ${env:BUN_VERSION}"
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\.bun\bin"

      - name: Verify Bun Version
        shell: bash
        run: |
          bun --version
          test "$(bun --version)" = "${BUN_VERSION}"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Verify Electrobun Patch Applied
        shell: bash
        run: |
          grep -Fq "setupWindowsRceditShim" node_modules/electrobun/bin/electrobun.cjs
          grep -Fq "NoProfile -NonInteractive -ExecutionPolicy Bypass" node_modules/electrobun/src/cli/index.ts

      - name: Bun Package Smoke Test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run package
